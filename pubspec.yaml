name: flutter_opencv_example
description: An example of using OpenCV natively in C++ in a Flutter app with Dart FFI
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=2.12.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: 1.0.8
  native_opencv:
    path: native_opencv
  ffi: ^2.1.5
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  file_picker: ^10.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true